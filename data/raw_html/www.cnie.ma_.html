  <!-- inline spinner styles to be able to display spinner right away -->
  <style type="text/css">
    .loader,
    .loader:after {
      border-radius: 50%;
      width: 8em;
      height: 8em;

    }

    .loader {
      margin: 0px auto;
      font-size: 4px;
      position: absolute;
      top: 45%;
      left: 45%;
      text-indent: -9999em;
      border-top: 1.1em solid rgb(2, 168, 24);
      border-right: 1.1em solid rgb(2, 168, 24);
      border-bottom: 1.1em solid rgb(2, 168, 24);
      border-left: 1.1em solid rgb(69, 184, 113);
      -webkit-transform: translateZ(0);
      -ms-transform: translateZ(0);
      transform: translateZ(0);
      -webkit-animation: load8 1.1s infinite linear;
      animation: load8 1.1s infinite linear;
    }

    @-webkit-keyframes load8 {
      0% {
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
      }

      100% {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    @keyframes load8 {
      0% {
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
      }

      100% {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    .loader-page {
      position: absolute;
      top: 25%;
      left: 39%;
    }
  </style>
